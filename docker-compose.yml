services:
  relay:
    build: .
    image: qanal-relay:latest
    container_name: qanal-relay
    ports:
      - "8080:8080"
    volumes:
      - relay_data:/data
    environment:
      QANAL_ADDR: ":8080"
      QANAL_STORAGE: "/data"
      QANAL_TRANSFER_TTL: "24h"
      QANAL_MAX_FILE_SIZE: "107374182400"   # 100 GB
      QANAL_MAX_CHUNK_SIZE: "536870912"     # 512 MB
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  relay_data:
    driver: local
