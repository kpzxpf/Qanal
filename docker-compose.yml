version: "3.9"

services:
  qanal:
    build: .
    image: qanal:latest
    container_name: qanal
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - qanal_data:/data
    environment:
      - QANAL_ADDR=:8080
      - QANAL_STORAGE=/data
      - QANAL_MAX_FILE_SIZE=107374182400   # 100 GB
      - QANAL_MAX_CHUNK_SIZE=524288000     # 500 MB
      - QANAL_TRANSFER_TTL=24h
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qanal_data:
    driver: local
