services:
  qanal-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: qanal-web:latest
    container_name: qanal-web
    ports:
      - "8080:8080"
    volumes:
      - qanal_web_data:/data
    environment:
      QANAL_ADDR: ":8080"
      QANAL_STORAGE: "/data"
      QANAL_TRANSFER_TTL: "24h"
      QANAL_MAX_FILE_SIZE: "107374182400"   # 100 GB
      QANAL_MAX_CHUNK_SIZE: "536870912"     # 512 MB
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qanal_web_data:
    driver: local
